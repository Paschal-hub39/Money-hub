<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paschala Hub | Secure Tactical</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="manifest" href="manifest.json">
<style>
  :root { --primary: #ff4da6; --bg: #0f0f14; --card-bg: #1a1a22; --accent: #00ff88; --pitch: #1b5e20; --google-blue: #4285F4; }
  body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color:white; padding-bottom: 90px; }
  
  /* Header */
  header { display:flex; justify-content:space-between; align-items:center; padding:15px; background:var(--card-bg); border-bottom: 2px solid var(--primary); }
  .logo { font-weight: bold; font-size: 1.2rem; color: var(--primary); }
  #userLabel { font-size:0.8rem; color:var(--accent); cursor:pointer; }

  /* Auth Box */
  #authBox { max-width: 400px; margin: 40px auto; padding: 20px; text-align: center; }
  .auth-btn { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
  .btn-google { background: white; color: #555; }
  .btn-phone { background: var(--accent); color: #000; }
  .btn-email { background: var(--primary); color: white; }

  input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #252530; color: white; box-sizing: border-box; }

  /* Pitch */
  .pitch { background: var(--pitch); border-radius: 15px; height: 480px; margin: 15px; display: grid; grid-template-rows: repeat(5, 1fr); border:3px solid rgba(255,255,255,0.2); }
  .pitch-row { display:flex; justify-content:center; align-items:center; gap:12px; }
  .player { background:white; color:black; width:72px; padding:5px; border-radius:4px; text-align:center; font-size:10px; border-bottom:4px solid gold; cursor:pointer; user-select:none; }
  .player strong { display:block; font-size:11px; white-space:nowrap; overflow:hidden; }

  .container { background: rgba(26, 26, 34, 0.95); padding: 15px; border-radius: 15px; margin: 15px; border: 1px solid #333; }
  .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }

  /* Bottom nav */
  .bottom-nav { position: fixed; bottom:0; width:100%; height:75px; background:#16161d; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #333; }
  .nav-item { color: #888; text-align:center; font-size:0.7rem; cursor:pointer; }
  .nav-item.active { color: var(--primary); }

  /* Draggable placeholder */
  .dragging { opacity:0.5; }
</style>
</head>
<body>

<header>
  <div class="logo">Paschala Hub</div>
  <div id="userLabel">Guest</div>
</header>

<!-- AUTH BOX -->
<div id="authBox">
  <h2>Welcome to Paschala Hub</h2>
  <p style="color:#777; font-size:0.85rem;">Tactical Hub & Profit Strategies</p>

  <button class="auth-btn btn-google" onclick="loginGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Login
  </button>

  <div style="margin:15px 0; color:#444; font-size:0.8rem;">— OPTIONAL METHODS —</div>

  <input id="email" type="email" placeholder="Email (for Login Link)">
  <button class="auth-btn btn-email" onclick="sendEmailLink()">Send Link to Gmail</button>

  <div id="phoneArea">
    <input id="phoneNumber" type="tel" placeholder="+234 Phone Number">
    <div id="recaptcha-container"></div>
    <button class="auth-btn btn-phone" onclick="sendPhoneOTP()">Login via SMS</button>
  </div>

  <div id="otpArea" style="display:none;">
    <input id="otpCode" type="text" placeholder="Enter SMS Code">
    <button class="auth-btn btn-phone" onclick="verifyOTP()">Verify OTP</button>
  </div>
  <p id="authStatus" style="font-size:0.75rem; margin-top:15px;"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="container">
    <select id="formationSelect" onchange="render()">
      <option value="4-3-1-2">4-3-1-2 (Diamond)</option>
      <option value="4-2-1-3">4-2-1-3 (Offensive)</option>
      <option value="custom">Custom Formation</option>
    </select>
    <div class="pitch" id="pitch"></div>
  </div>

  <div class="container">
    <h3><i class="fas fa-user-plus"></i> Add Player</h3>
    <input id="pName" placeholder="Name (e.g., Batistuta)">
    <div style="display:flex; gap:10px;">
      <input id="pRating" type="number" placeholder="Rating">
      <select id="pRole">
        <option value="CF">CF</option><option value="AMF">AMF</option>
        <option value="CMF">CMF</option><option value="DMF">DMF</option>
        <option value="CB">CB</option><option value="LB">LB</option>
        <option value="RB">RB</option><option value="GK">GK</option>
      </select>
    </div>
    <button class="btn-action" onclick="savePlayer()">ADD TO SQUAD</button>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('app')"><i class="fas fa-gamepad fa-lg"></i><br>Tactics</div>
  <div class="nav-item" onclick="auth.signOut()"><i class="fas fa-power-off fa-lg"></i><br>Logout</div>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC60kQZtBM8iIDh46UX577t4YdnujU6kgs",
  authDomain: "money-app-bac4c.firebaseapp.com",
  projectId: "money-app-bac4c",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- AUTH FUNCTIONS ---
function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err=>alert(err.message));
}

async function sendEmailLink() {
  const email = document.getElementById("email").value.trim();
  const settings = { url: window.location.href, handleCodeInApp: true };
  try {
    await auth.sendSignInLinkToEmail(email, settings);
    localStorage.setItem('emailForSignIn', email);
    document.getElementById("authStatus").innerText = "Check your Gmail for the login link!";
  } catch(err) { alert(err.message); }
}

window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

async function sendPhoneOTP() {
  const phone = document.getElementById("phoneNumber").value.trim();
  try {
    window.confirmationResult = await auth.signInWithPhoneNumber(phone, window.recaptchaVerifier);
    document.getElementById("phoneArea").style.display="none";
    document.getElementById("otpArea").style.display="block";
  } catch(err) { alert(err.message); }
}

async function verifyOTP() {
  const code = document.getElementById("otpCode").value;
  try { await window.confirmationResult.confirm(code); } catch(err){ alert("Wrong Code!"); }
}

// --- APP STATE ---
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("authBox").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("userLabel").innerText="Hi, "+(user.displayName||"User");
    loadPlayers();
  } else {
    document.getElementById("authBox").style.display="block";
    document.getElementById("app").style.display="none";
    if(auth.isSignInWithEmailLink(window.location.href)){
      const email = localStorage.getItem('emailForSignIn')||prompt("Enter email:");
      auth.signInWithEmailLink(email, window.location.href).then(()=>localStorage.removeItem('emailForSignIn'));
    }
  }
});

// --- PLAYER MANAGEMENT ---
let players=[];
async function loadPlayers(){
  if(!auth.currentUser) return;
  const snap = await db.collection("users").doc(auth.currentUser.uid).collection("players").get();
  players = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

async function savePlayer(){
  const name=document.getElementById("pName").value;
  const rating=document.getElementById("pRating").value;
  const role=document.getElementById("pRole").value;
  if(!name) return;
  await db.collection("users").doc(auth.currentUser.uid).collection("players").add({name,rating,role});
  document.getElementById("pName").value="";
  document.getElementById("pRating").value="";
  loadPlayers();
}

// --- RENDER PITCH ---
function render(){
  const pitch=document.getElementById("pitch");
  pitch.innerHTML="";
  const rows={atk:["CF","SS"],amf:["AMF"],mid:["CMF","DMF"],def:["CB","LB","RB"],gk:["GK"]};
  Object.keys(rows).forEach(k=>{
    const rowDiv=document.createElement("div");
    rowDiv.className="pitch-row";
    players.filter(p=>rows[k].includes(p.role)).forEach(p=>{
      const card=document.createElement("div");
      card.className="player";
      card.setAttribute("draggable", k!=="gk");
      card.innerHTML=`<small style="font-size:7px; color:var(--primary)">${p.role}</small><strong>${p.name}</strong><span>⭐${p.rating}</span>`;
      card.addEventListener("dragstart", e=>card.classList.add("dragging"));
      card.addEventListener("dragend", e=>card.classList.remove("dragging"));
      rowDiv.appendChild(card);
    });
    pitch.appendChild(rowDiv);
  });
}
</script>
<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then(()=>console.log('SW Registered'));
  }
</script>
</body>
</html>
