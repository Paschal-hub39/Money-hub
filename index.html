<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paschala Hub | Secure Tactical</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root { --primary:#ff4da6; --bg:#0f0f14; --card-bg:#1a1a22; --accent:#00ff88; --pitch:#1b5e20; --pos-bg:#ffd700; }
body { margin:0; font-family:'Segoe UI',sans-serif; background:var(--bg); color:white; padding-bottom:90px; }

nav { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#111; color:white; }
nav button { margin-left:5px; padding:5px 10px; border:none; border-radius:5px; background:#222; color:white; cursor:pointer; }
nav button:hover { background:var(--primary); }

#authOverlay { position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px; }
.auth-box { background:var(--card-bg); padding:30px; border-radius:20px; width:100%; max-width:400px; border:1px solid #333; text-align:center; }
.auth-box input { width:100%; padding:14px; margin-bottom:12px; border-radius:10px; border:1px solid #444; background:#252530; color:white; box-sizing:border-box; }

.btn-main { width:100%; padding:15px; border-radius:12px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer; margin-bottom:5px; }

.pitch-area { background:var(--pitch); border:3px solid rgba(255,255,255,0.3); border-radius:10px; height:450px; display:flex; flex-direction:column; justify-content:space-between; padding:20px 0; }
.position-row { display:flex; justify-content:center; gap:12px; width:100%; min-height:80px; align-items:center; }
.player-card { background:#fff; color:#000; border-radius:4px; width:65px; padding:5px; text-align:center; border-bottom:4px solid var(--pos-bg); transition: all 0.3s ease; }
.player-card.highlight-slot { border:3px dashed var(--accent); transform:scale(1.05); }
.pos-label { background:#000; color:var(--pos-bg); font-size:0.6rem; font-weight:bold; display:block; }
.p-name { font-size:0.65rem; font-weight:bold; display:block; margin-top:2px; }

.section { display:none; margin-top:10px; }
#playerList div { border:1px solid #555; padding:10px; margin:5px; border-radius:8px; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="authOverlay">
  <div class="auth-box">
    <h1 style="color:var(--primary)">Paschala Hub</h1>
    <p id="authMsg" style="color:#888; font-size:0.85rem;">Sign in to continue</p>
    <input id="email" type="email" placeholder="Enter your email">
    <button class="btn-main" onclick="sendLoginLink()">Send Email Link</button>
    <button class="btn-main" onclick="signInWithGoogle()">Sign in with Google</button>
    <p id="authError" style="color:#ff4d4d; font-size:0.75rem; margin-top:15px;"></p>
  </div>
</div>

<!-- NAVIGATION -->
<nav id="mainNav" style="display:none;">
  <span>Paschala Hub</span>
  <div>
    <button onclick="showSection('pitchSection')">Pitch</button>
    <button onclick="showSection('playerSection')">Players</button>
    <button onclick="showSection('moneySection')">Wallet</button>
    <button onclick="showSection('aiSection')">AI Manager</button>
    <button onclick="showSection('settingsSection')">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- APP CONTENT -->
<div class="container" id="appContent" style="display:none;">
  <div id="pitchSection" class="section">
    <div id="formationTabs" style="display:flex; gap:5px; margin-bottom:10px;"></div>
    <div id="playStyles" style="display:flex; gap:5px; margin-bottom:10px;"></div>
    <div class="pitch-area" id="pitch"></div>
  </div>

  <div id="playerSection" class="section">
    <h3>Manage Players</h3>
    <div id="playerFormContainer">
      <div id="playerList"></div>
    </div>
  </div>

  <div id="moneySection" class="section">
    <h3>Wallet / Paystack</h3>
    <button id="buyPremiumWallet" class="btn-main">Add Money / Unlock Premium</button>
    <div id="walletBalance">Balance: ₦0</div>
  </div>

  <div id="aiSection" class="section">
    <h3>AI Manager</h3>
    <input id="managerAIInput" placeholder="Ask AI (Best striker, formation, sub...)">
    <button class="btn-main" onclick="managerAI()">Ask AI</button>
    <div id="managerAIResult" style="margin-top:5px; color:var(--accent); font-weight:bold;"></div>
  </div>

  <div id="settingsSection" class="section">
    <h3>Settings</h3>
    <p>Change theme colors, pitch color, card styles, etc.</p>
  </div>
</div>

<!-- FIREBASE MODULAR -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60kQZtBM8iIDh46UX577t4YdnujU6kgs",
  authDomain: "money-app-bac4c.firebaseapp.com",
  projectId: "money-app-bac4c",
  storageBucket: "money-app-bac4c.firebasestorage.app",
  messagingSenderId: "663419222795",
  appId: "1:663419222795:web:1ad595d41854f3cc45000e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// EMAIL LINK
const actionCodeSettings = { url: window.location.href, handleCodeInApp: true };
window.sendLoginLink = async function(){
  const email = document.getElementById("email").value;
  try {
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    localStorage.setItem('emailForSignIn', email);
    alert("Check your email for login link!");
  } catch(e){ alert(e.message); }
}

// GOOGLE LOGIN
window.signInWithGoogle = async function(){
  try { await signInWithPopup(auth, provider); } 
  catch(e){ alert(e.message); }
}

// LOGOUT
window.logout = function(){ signOut(auth).then(()=>location.reload()); }

// COMPLETE EMAIL SIGN-IN
async function completeSignIn(){
  if(isSignInWithEmailLink(auth, window.location.href)){
    let email = localStorage.getItem('emailForSignIn');
    if(!email) email = prompt("Enter your email again:");
    try { await signInWithEmailLink(auth, email, window.location.href); localStorage.removeItem('emailForSignIn'); }
    catch(e){ alert(e.message); }
  }
}

// AUTH STATE
onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById("authOverlay").style.display="none";
    document.getElementById("mainNav").style.display="flex";
    document.getElementById("appContent").style.display="block";
    renderFormationTabs(); renderPlayStyles(); renderPlayerList(); renderPitch();
  } else { completeSignIn(); }
});

/* ===== SECTIONS ===== */
window.showSection = function(id){
  ['pitchSection','playerSection','moneySection','aiSection','settingsSection'].forEach(s=>document.getElementById(s).style.display=(s===id?'block':'none'));
}

/* ===== PLAYER DATA ===== */
let starters=[{name:"Player1",position:"GK",rating:105,role:"Goalkeeper",matchesPlayed:5,stamina:90},{name:"Player2",position:"RB",rating:102,role:"Defender",matchesPlayed:5,stamina:88},{name:"Player3",position:"CB",rating:104,role:"Defender",matchesPlayed:5,stamina:92},{name:"Player4",position:"CB",rating:103,role:"Defender",matchesPlayed:5,stamina:91},{name:"Player5",position:"LB",rating:101,role:"Defender",matchesPlayed:5,stamina:87},{name:"Player6",position:"CMF",rating:106,role:"Midfielder",matchesPlayed:5,stamina:93},{name:"Player7",position:"CMF",rating:104,role:"Midfielder",matchesPlayed:5,stamina:91},{name:"Player8",position:"AMF",rating:102,role:"Midfielder",matchesPlayed:5,stamina:89},{name:"Player9",position:"RW",rating:107,role:"Forward",matchesPlayed:5,stamina:95},{name:"Player10",position:"ST",rating:108,role:"Forward",matchesPlayed:5,stamina:97},{name:"Player11",position:"LW",rating:106,role:"Forward",matchesPlayed:5,stamina:94}];
let substitutes=[{name:"Sub1",position:"GK",rating:95,role:"Goalkeeper",matchesPlayed:2,stamina:80},{name:"Sub2",position:"CB",rating:97,role:"Defender",matchesPlayed:2,stamina:85},{name:"Sub3",position:"CMF",rating:98,role:"Midfielder",matchesPlayed:2,stamina:84},{name:"Sub4",position:"ST",rating:99,role:"Forward",matchesPlayed:2,stamina:86}];

/* ===== FORMATIONS ===== */
let formations=['4-4-2','4-3-3','4-2-3-1','3-5-2','5-3-2','3-4-3','4-1-2-1-2'];
let userFormations=[]; let currentFormation='4-3-3';

function renderFormationTabs(){
  const container=document.getElementById('formationTabs'); container.innerHTML='';
  formations.concat(userFormations).forEach(f=>{ const btn=document.createElement('button'); btn.innerText=f; btn.onclick=()=>setFormation(f); container.appendChild(btn); });
  const customBtn=document.createElement('button'); customBtn.innerText='Create Formation'; customBtn.onclick=()=>{ const name=prompt('Custom formation name:'); if(!name)return; userFormations.push(name); renderFormationTabs(); setFormation(name); }; container.appendChild(customBtn);
}
function setFormation(f){ currentFormation=f; renderPitch(); document.getElementById('managerAIResult').innerText=`Formation set to ${f}`; }

/* ===== PLAY STYLES ===== */
let playStyles=['Possession','Counter','High Press','Balanced']; let currentPlayStyle='Balanced';
function renderPlayStyles(){ const container=document.getElementById('playStyles'); container.innerHTML=''; playStyles.forEach(s=>{ const btn=document.createElement('button'); btn.innerText=s; btn.onclick=()=>{ currentPlayStyle=s; document.getElementById('managerAIResult').innerText=`Play style: ${s}`; }; container.appendChild(btn); }); }

/* ===== PLAYER LIST ===== */
function renderPlayerList(){
  const container=document.getElementById('playerList'); container.innerHTML='';
  [...starters,...substitutes].forEach(p=>{
    const div=document.createElement('div');
    div.innerHTML=`<b>${p.name}</b> (${p.position})<br>
      Rating: <input type="number" min="0" value="${p.rating}" style="width:50px" onchange="updatePlayerStat('${p.name}','rating',this.value)">
      Matches: <input type="number" min="0" value="${p.matchesPlayed}" style="width:50px" onchange="updatePlayerStat('${p.name}','matchesPlayed',this.value)">
      Stamina: <input type="number" min="0" value="${p.stamina}" style="width:50px" onchange="updatePlayerStat('${p.name}','stamina',this.value)">`;
    container.appendChild(div);
  });
}
function updatePlayerStat(name,field,value){ let p=starters.find(p=>p.name===name)||substitutes.find(p=>p.name===name); if(p)p[field]=Number(value); renderPitch(); }

/* ===== PITCH ===== */
function renderPitch(){
  const pitch=document.getElementById('pitch'); pitch.innerHTML='';
  let rows=getFormationRows(currentFormation);
  rows.forEach(r=>{
    const rowDiv=document.createElement('div'); rowDiv.className='position-row';
    r.forEach(pos=>{ let player=[...starters,...substitutes].find(p=>p.position===pos); const card=document.createElement('div'); card.className='player-card'; card.innerHTML=`<span class="pos-label">${pos}</span><span class="p-name">${player?player.name:pos}</span>`; rowDiv.appendChild(card); });
    pitch.appendChild(rowDiv);
  });
}
function getFormationRows(f){
  switch(f){
    case '4-4-2': return [['GK'],['LB','CB','CB','RB'],['LMF','CMF','CMF','RMF'],['ST','ST']];
    case '4-3-3': return [['GK'],['LB','CB','CB','RB'],['CMF','CMF','CMF'],['LW','ST','RW']];
    case '4-2-3-1': return [['GK'],['LB','CB','CB','RB'],['CMF','CMF'],['LAMF','AMF','RAMF'],['ST']];
    case '3-5-2': return [['GK'],['CB','CB','CB'],['LMF','CMF','CMF','CMF','RMF'],['ST','ST']];
    case '5-3-2': return [['GK'],['LWB','CB','CB','CB','RWB'],['CMF','CMF','CMF'],['ST','ST']];
    case '3-4-3': return [['GK'],['CB','CB','CB'],['LMF','CMF','RMF','AMF'],['LW','ST','RW']];
    case '4-1-2-1-2': return [['GK'],['LB','CB','CB','RB'],['CDM'],['CMF','CMF'],['AMF'],['ST','ST']];
    default: return [['GK'],['LB','CB','CB','RB'],['CMF','CMF','CMF'],['LW','ST','RW']];
  }
}

/* ===== AI MANAGER ===== */
window.managerAI = function(){
  const q=document.getElementById('managerAIInput').value.toLowerCase(); let ans="I couldn't understand the question.";
  if(q.includes("best striker")){ const s=[...starters,...substitutes].filter(p=>p.role.includes('Forward')); const best=s.reduce((a,b)=>b.rating>a.rating?b:a,s[0]); ans=`Best striker: ${best.name} rating ${best.rating}`;}
  else if(q.includes("formation")){ ans=`Based on your squad, ${currentFormation} suits best.`;}
  else if(q.includes("substitute")){ const weak=starters.reduce((a,b)=>b.rating<a.rating?b:a,starters[0]); const bestSub=substitutes.filter(s=>s.rating>weak.rating)[0]; ans=`Sub ${weak.name} with ${bestSub.name}`;}
  else if(q.includes("play style")){ ans=`For ${currentPlayStyle}, strengthen midfield and wings.`;}
  document.getElementById('managerAIResult').innerText=ans;
}
</script>
</body>
</html>
