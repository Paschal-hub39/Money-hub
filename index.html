<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paschala Hub | eFootball Squad Builder</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#0f0f14;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#1a1a22;
}

button{
  background:#ff4da6;
  border:none;
  padding:6px 10px;
  color:white;
  border-radius:6px;
  margin:3px;
  cursor:pointer;
  font-size:12px;
}

/* LOGIN BOX */
#authBox{
  padding:15px;
}

/* APP */
.container{
  padding:10px;
}

/* PITCH */
.pitch{
  background:#1b5e20;
  border-radius:12px;
  height:450px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
  justify-content:center;
}

/* PLAYER CARD */
.player{
  background:white;
  color:black;
  width:80px;
  padding:5px;
  border-radius:8px;
  text-align:center;
  font-size:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.3);
  cursor:grab;
}
.player.fixed{
  cursor:not-allowed;
  background:#ddd;
}
.player strong{
  font-size:11px;
}

select,input{
  width:100%;
  margin-top:3px;
  border-radius:4px;
  padding:3px;
}
</style>

</head>
<body>

<header>
  <span id="userText">Not logged in</span>
  <div>
    <select id="managerSelect" onchange="selectManager()">
      <option value="">Select Manager</option>
      <option value="Possession Ball">Possession Ball</option>
      <option value="Quick Counter">Quick Counter</option>
      <option value="Long Ball Counter">Long Ball Counter</option>
      <option value="Out Wide">Out Wide</option>
      <option value="Long Ball">Long Ball</option>
    </select>
    <select id="formationSelect" onchange="setFormation(this.value)">
      <option value="4-3-3">4-3-3</option>
      <option value="4-2-3-1">4-2-3-1</option>
      <option value="3-5-2">3-5-2</option>
      <option value="4-4-2">4-4-2</option>
      <option value="4-1-4-1">4-1-4-1</option>
      <option value="3-4-3">3-4-3</option>
      <option value="5-3-2">5-3-2</option>
      <option value="4-2-2-2">4-2-2-2</option>
    </select>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<!-- LOGIN -->
<div id="authBox">
  <h3>Login</h3>
  <input id="email" placeholder="Enter email">
  <button onclick="sendLink()">Send Login Link</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="container">
    <button onclick="addPlayer()">➕ Add Player</button>
    <div class="pitch" id="pitch"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyC60kQZtBM8iIDh46UX577t4YdnujU6kgs",
  authDomain: "money-app-bac4c.firebaseapp.com",
  projectId: "money-app-bac4c",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let players = [];
let currentFormation = "4-3-3";
let manager = "";

// LOGIN
async function sendLink(){
  const email=document.getElementById("email").value.trim();
  const actionCodeSettings={url:window.location.href, handleCodeInApp:true};
  await auth.sendSignInLinkToEmail(email,actionCodeSettings);
  localStorage.setItem("emailForSignIn", email);
  alert("Check your email!");
}
async function completeSignIn(){
  if(auth.isSignInWithEmailLink(window.location.href)){
    let email=localStorage.getItem("emailForSignIn");
    if(!email) email=prompt("Enter your email again");
    await auth.signInWithEmailLink(email, window.location.href);
    localStorage.removeItem("emailForSignIn");
  }
}

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("authBox").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("userText").innerText="Hi "+user.email;
    loadPlayers();
  }else{
    completeSignIn();
  }
});

// LOGOUT
function logout(){ auth.signOut(); }

// MANAGER
function selectManager(){
  manager = document.getElementById("managerSelect").value;
}

// FORMATION
function setFormation(val){ currentFormation = val; render(); }

// ADD PLAYER
async function addPlayer(){
  const name=prompt("Player name:");
  if(!name) return;
  const rating=parseInt(prompt("Rating (0-200):"))||100;
  const stamina=parseInt(prompt("Stamina (0-100):"))||90;
  const role = prompt("Role/Playstyle (e.g., Goal Poacher, Box-to-Box, Creative Playmaker, DMF, AMF, etc.)") || "CMF";
  const uid=auth.currentUser.uid;
  await db.collection("users").doc(uid).collection("players").add({name,rating,stamina,role,position:null});
  loadPlayers();
}

// LOAD
async function loadPlayers(){
  const uid = auth.currentUser.uid;
  const snap = await db.collection("users").doc(uid).collection("players").get();
  players=[];
  snap.forEach(doc=>players.push({id:doc.id,...doc.data()}));
  render();
}

// RENDER
function render(){
  const pitch=document.getElementById("pitch");
  pitch.innerHTML="";
  // For demo, 11 slots
  const slots = Array.from({length:11}, (_,i)=>i);
  slots.forEach(i=>{
    const p = players[i] || {name:"Empty", rating:0, stamina:0, role:"CMF", id:null};
    const div=document.createElement("div");
    div.className="player"+(i===0?" fixed":"");
    div.dataset.id = p.id;
    div.innerHTML=`
      <strong>${p.name}</strong><br>
      ⭐ ${p.rating}<br>
      🔋 ${p.stamina}<br>
      <small>${p.role}</small><br>
      ${p.id?`
      <button onclick="editPlayer('${p.id}')">✏️</button>
      <button onclick="deletePlayer('${p.id}')">🗑</button>
      <button onclick="askAI('${p.id}')">🤖</button>`:""}
    `;
    pitch.appendChild(div);
  });

  // SortableJS drag & drop
  new Sortable(pitch,{
    animation:150,
    ghostClass:'ghost',
    filter:'.fixed', // GK fixed
    onEnd: async function(evt){
      // Save positions to Firestore
      const uid = auth.currentUser.uid;
      players.forEach((p, index)=>{
        if(p.id) db.collection("users").doc(uid).collection("players").doc(p.id).update({position:index});
      });
    }
  });
}

// EDIT PLAYER
async function editPlayer(id){
  const p = players.find(x=>x.id===id);
  const name = prompt("Name:",p.name) || p.name;
  const rating = parseInt(prompt("Rating:",p.rating))||p.rating;
  const stamina = parseInt(prompt("Stamina:",p.stamina))||p.stamina;
  const role = prompt("Role/Playstyle:",p.role)||p.role;
  const uid = auth.currentUser.uid;
  await db.collection("users").doc(uid).collection("players").doc(id).update({name,rating,stamina,role});
  loadPlayers();
}

// DELETE PLAYER
async function deletePlayer(id){
  if(!confirm("Release player?")) return;
  const uid = auth.currentUser.uid;
  await db.collection("users").doc(uid).collection("players").doc(id).delete();
  loadPlayers();
}

// AI SUGGESTION
function askAI(id){
  const p = players.find(x=>x.id===id);
  let role="CMF";
  if(p.rating>=140) role="ST 🔥 Goal Machine";
  else if(p.rating>=120 && p.stamina>=90) role="Box-to-Box CMF";
  else if(p.stamina>=95) role="Wing Back";
  else if(p.rating<100) role="DMF (Defensive)";
  alert(`${p.name} best role: ${role}`);
}
</script>

</body>
</html>
