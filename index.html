<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paschala Hub | Secure Tactical</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root { --primary: #ff4da6; --bg: #0f0f14; --card-bg: #1a1a22; --accent: #00ff88; --pitch: #1b5e20; --pos-bg: #ffd700; }
  body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color:white; padding-bottom: 90px; }
  
  /* Auth Screen */
  #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-box { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid #333; text-align: center; }

  .container { background: rgba(26, 26, 34, 0.95); padding: 15px; border-radius: 15px; margin: 10px; border: 1px solid #333; }
  input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #252530; color: white; box-sizing: border-box; }
  .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
  
  /* Pitch Layout */
  .pitch-area { background: var(--pitch); border: 3px solid rgba(255,255,255,0.3); border-radius: 10px; height: 450px; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 0; }
  .position-row { display: flex; justify-content: center; gap: 12px; width: 100%; min-height: 80px; align-items: center; }
  .player-card { background: #fff; color: #000; border-radius: 4px; width: 65px; padding: 5px; text-align: center; border-bottom: 4px solid var(--pos-bg); }
  .pos-label { background: #000; color: var(--pos-bg); font-size: 0.6rem; font-weight: bold; display: block; }
  .p-name { font-size: 0.65rem; font-weight: bold; display: block; margin-top: 2px; }
</style>
</head>
<body>

<div id="authOverlay">
  <div class="auth-box">
    <h1 style="color:var(--primary);">Paschala Hub</h1>
    <p id="authMsg" style="color:#888; font-size:0.85rem;">Enter your Gmail to receive a login link</p>
    <input id="email" type="email" placeholder="paschalkamsi9@gmail.com">
    <button class="btn-main" onclick="sendLoginLink()">SEND LOGIN LINK</button>
    <p id="authError" style="color:#ff4d4d; font-size:0.75rem; margin-top:15px;"></p>
  </div>
</div>

<div id="appContent" style="display:none;">
  <div class="container">
    <div class="pitch-area" id="pitch"></div>
  </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC60kQZtBM8iIDh46UX577t4YdnujU6kgs",
  authDomain: "money-app-bac4c.firebaseapp.com",
  projectId: "money-app-bac4c",
  storageBucket: "money-app-bac4c.firebasestorage.app",
  messagingSenderId: "663419222795",
  appId: "1:663419222795:web:1ad595d41854f3cc45000e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 1. SEND REAL EMAIL LINK
async function sendLoginLink() {
  const emailInput = document.getElementById("email").value.trim();
  const actionCodeSettings = {
    url: window.location.href, // This brings the user back to your app
    handleCodeInApp: true,
  };

  try {
    await auth.sendSignInLinkToEmail(emailInput, actionCodeSettings);
    window.localStorage.setItem('emailForSignIn', emailInput);
    document.getElementById("authMsg").innerText = "Check your Gmail! We sent a login link.";
    document.getElementById("email").style.display = "none";
  } catch (error) {
    document.getElementById("authError").innerText = error.message;
  }
}

// 2. CHECK IF USER IS RETURNING FROM EMAIL LINK
async function completeSignIn() {
  if (auth.isSignInWithEmailLink(window.location.href)) {
    let email = window.localStorage.getItem('emailForSignIn');
    if (!email) {
      email = window.prompt('Please provide your email for confirmation');
    }
    try {
      await auth.signInWithEmailLink(email, window.location.href);
      window.localStorage.removeItem('emailForSignIn');
    } catch (error) {
      alert(error.message);
    }
  }
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("authOverlay").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    // renderPitch();
  } else {
    completeSignIn();
  }
});
</script>
</body>
</html>
