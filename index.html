<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paschala Hub | Secure Tactical</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root { --primary: #ff4da6; --bg: #0f0f14; --card-bg: #1a1a22; --accent: #00ff88; --pitch: #1b5e20; --pos-bg: #ffd700; }
  body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color:white; padding-bottom: 90px; }
  
  /* Auth Screen Fixes */
  #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
  .auth-box { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid #333; }
  
  /* Pitch Layout Fix */
  .pitch-area { 
    background: var(--pitch); border: 3px solid rgba(255,255,255,0.3); border-radius: 10px; 
    height: 460px; display: flex; flex-direction: column; justify-content: space-between; padding: 15px 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 44px, rgba(255,255,255,0.03) 45px);
  }
  .position-row { display: flex; justify-content: center; gap: 10px; width: 100%; min-height: 80px; align-items: center; }
  
  .player-card { 
    background: #fff; color: #000; border-radius: 4px; width: 65px; padding: 5px;
    text-align: center; cursor: pointer; border-bottom: 4px solid var(--pos-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .pos-label { background: #000; color: var(--pos-bg); font-size: 0.6rem; font-weight: bold; display: block; border-radius: 2px; }
  .p-name { font-size: 0.65rem; font-weight: bold; display: block; margin-top: 2px; white-space: nowrap; overflow: hidden; text-transform: uppercase; }

  /* Modals */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
  .modal-content { background: var(--card-bg); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid var(--primary); text-align: center; }

  .container { background: rgba(26, 26, 34, 0.95); padding: 15px; border-radius: 15px; margin: 10px; border: 1px solid #333; }
  input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #252530; color: white; box-sizing: border-box; }
  select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #252530; color: white; }
  .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
  
  .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #16161d; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
  .nav-item { color: #888; text-align: center; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
  .nav-item.active { color: var(--primary); transform: translateY(-5px); }
</style>
</head>
<body>

<div id="authOverlay">
  <div class="auth-box">
    <h1 style="color:var(--primary); margin:0;">Paschala Hub</h1>
    <div id="authStep1">
      <p style="font-size:0.85rem; color:#888;">Enter email to receive your access code</p>
      <input id="email" type="email" placeholder="paschalkamsi9@gmail.com">
      <input id="pass" type="password" placeholder="Choose Password">
      <button class="btn-main" onclick="sendCode()">SEND ACCESS CODE</button>
    </div>
    
    <div id="authStep2" style="display:none;">
      <p style="font-size:0.85rem; color:var(--accent);">Check your email for the code!</p>
      <input id="verifyCode" type="text" placeholder="Enter 6-Digit Code">
      <button class="btn-main" onclick="handleFinalAuth()">VERIFY & LOGIN</button>
      <p onclick="location.reload()" style="font-size:0.7rem; color:#888; margin-top:15px; cursor:pointer;">Back to Email</p>
    </div>
    <p id="authError" style="color:#ff4d4d; font-size:0.75rem; margin-top:15px;"></p>
  </div>
</div>

<div id="statModal" class="modal" onclick="this.style.display='none'">
  <div class="modal-content">
    <h2 id="mName" style="color:var(--primary);"></h2>
    <div style="display:flex; justify-content:space-around; margin:20px 0;">
      <div><h1 id="mG" style="color:var(--accent); margin:0;">0</h1><p>Goals</p></div>
      <div><h1 id="mA" style="color:var(--accent); margin:0;">0</h1><p>Assists</p></div>
    </div>
    <div id="mAdvice" style="background:#000; padding:15px; border-radius:10px; font-size:0.85rem; border-left:4px solid var(--accent);"></div>
    <button class="btn-main" style="margin-top:20px;">BACK TO FIELD</button>
  </div>
</div>

<div id="squadTab" class="tab-content active-tab">
  <div class="container">
    <select id="formSelect" onchange="renderPitch()">
      <option value="4-3-1-2">4-3-1-2 (Diamond - Batistuta Focus)</option>
      <option value="4-2-1-3">4-2-1-3 (Offensive - Hazard/Williams Wings)</option>
      <option value="4-2-2-2 (Counter - Fabio Capello Style)"></option>
    </select>
    <div class="pitch-area" id="pitch"></div>
  </div>

  <div class="container">
    <h3>Register Player</h3>
    <input id="pName" placeholder="Name (e.g. Estevao)">
    <div style="display:flex; gap:10px;">
      <input id="pG" type="number" placeholder="G">
      <input id="pA" type="number" placeholder="A">
    </div>
    <select id="pPos">
      <option value="CF">CF</option><option value="SS">SS</option><option value="AMF">AMF</option>
      <option value="LWF">LWF</option><option value="RWF">RWF</option><option value="CMF">CMF</option>
      <option value="DMF">DMF</option><option value="CB">CB</option><option value="GK">GK</option>
      <option value="SUB">BENCH (Reserve)</option>
    </select>
    <button class="btn-main" onclick="savePlayer()">ADD TO HUB</button>
  </div>

  <div id="benchSection" class="container" style="display:none; border-color:var(--accent);">
    <h3 style="margin:0;"><i class="fas fa-exchange-alt"></i> Tactical Bench</h3>
    <div id="benchList" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;"></div>
  </div>
</div>

<div id="moneyTab" class="tab-content">
  <div class="container">
    <h2>💸 Money Strategies</h2>
    <input id="ideaInput" placeholder="Enter profit strategy...">
    <button class="btn-main" onclick="saveIdea()">POST STRATEGY</button>
  </div>
  <div id="ideasDisplay"></div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('squadTab', this)"><i class="fas fa-tshirt fa-lg"></i><br>Squad</div>
  <div class="nav-item" onclick="switchTab('moneyTab', this)"><i class="fas fa-wallet fa-lg"></i><br>Money</div>
  <div class="nav-item" onclick="auth.signOut()"><i class="fas fa-power-off fa-lg"></i><br>Logout</div>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC60kQZtBM8iIDh46UX577t4YdnujU6kgs",
  authDomain: "money-app-bac4c.firebaseapp.com",
  projectId: "money-app-bac4c",
  storageBucket: "money-app-bac4c.firebasestorage.app",
  messagingSenderId: "663419222795",
  appId: "1:663419222795:web:1ad595d41854f3cc45000e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// AUTH VERIFICATION LOGIC
function sendCode() {
  const email = document.getElementById("email").value.trim(); // Trim fix
  const pass = document.getElementById("pass").value;
  if(!email || !pass) return alert("Email/Password required!");
  
  // Transition to Verification Screen
  document.getElementById("authStep1").style.display = "none";
  document.getElementById("authStep2").style.display = "block";
}

async function handleFinalAuth() {
  const e = document.getElementById("email").value.trim();
  const p = document.getElementById("pass").value;
  const code = document.getElementById("verifyCode").value;
  const errBox = document.getElementById("authError");

  if(code.length < 4) {
    errBox.innerText = "Please enter the valid access code.";
    return;
  }

  try {
    // Attempt Login, if fails, create account
    try {
      await auth.signInWithEmailAndPassword(e, p);
    } catch(err) {
      await auth.createUserWithEmailAndPassword(e, p);
    }
  } catch(err) { errBox.innerText = err.message; }
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("authOverlay").style.display = "none";
    renderPitch(); loadIdeas();
  } else {
    document.getElementById("authOverlay").style.display = "flex";
  }
});

// SQUAD MANAGEMENT
async function savePlayer() {
  const name = document.getElementById("pName").value;
  const pos = document.getElementById("pPos").value;
  const g = document.getElementById("pG").value || 0;
  const a = document.getElementById("pA").value || 0;
  if(!name) return;
  await db.collection("squads").add({ uid: auth.currentUser.uid, name, pos, g, a, time: Date.now() });
  document.getElementById("pName").value = "";
}

function showStats(p) {
  document.getElementById("mName").innerText = p.name;
  document.getElementById("mG").innerText = p.g;
  document.getElementById("mA").innerText = p.a;
  
  const advice = {
    "CF": "Target Man style works best for " + p.name + " in eFootball 4-3-1-2 setups.",
    "LWF": "Prolific Winger role detected. Pair with Xabi Alonso for speed boosts.",
    "SUB": "Super-Sub ready. Bring on after 70' for +10% stat boost!"
  };
  document.getElementById("mAdvice").innerText = "AI INSIGHT: " + (advice[p.pos] || "Strong tactical fit for your team.");
  document.getElementById("statModal").style.display = "flex";
}

function renderPitch() {
  db.collection("squads").where("uid", "==", auth.currentUser.uid).onSnapshot(snap => {
    const pitch = document.getElementById("pitch");
    const bench = document.getElementById("benchList");
    pitch.innerHTML = ""; bench.innerHTML = "";
    
    const rows = { atk: ["CF", "SS", "LWF", "RWF"], mid: ["AMF", "CMF", "DMF"], def: ["CB", "LB", "RB"], gk: ["GK"] };

    Object.keys(rows).forEach(key => {
      let rowDiv = document.createElement("div"); rowDiv.className = "position-row";
      snap.forEach(doc => {
        const data = doc.data();
        if(rows[key].includes(data.pos)) {
          rowDiv.innerHTML += `<div class="player-card" onclick='showStats(${JSON.stringify(data)})'>
            <span class="pos-label">${data.pos}</span><span class="p-name">${data.name}</span></div>`;
        }
        if(data.pos === "SUB") {
          document.getElementById("benchSection").style.display = "block";
          bench.innerHTML += `<div class="container" style="margin:0; padding:10px; border-left:3px solid var(--accent);" onclick='showStats(${JSON.stringify(data)})'>
            <strong>${data.name}</strong><br><small style="color:var(--accent)">G/A: ${data.g}/${data.a}</small></div>`;
        }
      });
      pitch.appendChild(rowDiv);
    });
  });
}

function saveIdea() {
  const text = document.getElementById("ideaInput").value;
  db.collection("ideas").add({ text, user: auth.currentUser.email, time: Date.now() });
  document.getElementById("ideaInput").value = "";
}

function loadIdeas() {
  db.collection("ideas").orderBy("time", "desc").onSnapshot(snap => {
    const feed = document.getElementById("ideasDisplay");
    feed.innerHTML = "";
    snap.forEach(doc => {
      const d = doc.data();
      feed.innerHTML += `<div class="container"><strong>${d.text}</strong><br><small style="color:var(--primary)">${d.user}</small></div>`;
    });
  });
}

function switchTab(id, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(id).classList.add('active-tab');
  el.classList.add('active');
}
</script>
</body>
</html>
