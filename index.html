<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paschala Hub | Secure Tactical</title>

<!-- Logo for PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4da6">

<!-- Fonts & Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --primary: #ff4da6;
  --bg: #0f0f14;
  --card-bg: #1a1a22;
  --accent: #00ff88;
  --pitch: #1b5e20;
  --pos-bg: #ffd700;
}
body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color:white; padding-bottom: 90px; }

/* Header */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background: var(--card-bg);
  border-bottom: 1px solid #333;
  position: sticky;
  top:0;
  z-index: 1000;
}
header .logo { display:flex; align-items:center; gap:10px; }
header .logo img { height:40px; border-radius:5px; }
header .profile { cursor:pointer; }
header .hamburger { font-size:1.5rem; cursor:pointer; }

/* Overlay Menu */
#menuOverlay {
  position: fixed; inset:0;
  background: rgba(0,0,0,0.95);
  color:white;
  display:none;
  flex-direction: column;
  justify-content: center;
  align-items:center;
  z-index:2000;
  gap:20px;
}
#menuOverlay a { color:white; font-size:1.2rem; text-decoration:none; }

/* Auth Screen */
#authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid #333; text-align: center; }

/* Main container */
.container { background: rgba(26, 26, 34, 0.95); padding: 15px; border-radius: 15px; margin: 10px; border: 1px solid #333; }

/* Input & Button */
input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #252530; color: white; box-sizing: border-box; }
button { cursor:pointer; border:none; border-radius:10px; padding:10px; }

/* Pitch Layout */
.pitch-area { background: var(--pitch); border: 3px solid rgba(255,255,255,0.3); border-radius: 10px; height: 450px; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 0; }
.position-row { display: flex; justify-content: center; gap: 12px; width: 100%; min-height: 80px; align-items: center; }
.player-card { background: #fff; color: #000; border-radius: 4px; width: 65px; padding: 5px; text-align: center; border-bottom: 4px solid var(--pos-bg); cursor: grab; position: relative; }
.player-card:hover { transform: scale(1.05); box-shadow:0 0 10px var(--primary);}
.pos-label { background: #000; color: var(--pos-bg); font-size: 0.6rem; font-weight: bold; display: block; }
.p-name { font-size: 0.65rem; font-weight: bold; display: block; margin-top: 2px; }

/* Player edit/delete buttons */
.player-card .edit-btn, .player-card .delete-btn {
  position: absolute; top:2px; font-size:0.7rem; cursor:pointer; padding:2px;
}
.player-card .edit-btn { right:18px; color: var(--accent); }
.player-card .delete-btn { right:2px; color:#ff4d4d; }
</style>
</head>

<body>

<!-- Header -->
<header>
  <div class="logo"><img src="ei_1775215120589-removebg-preview_1~2.png" alt="Logo"><span id="greetingText">Hi Guest</span></div>
  <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
</header>

<!-- Menu Overlay -->
<div id="menuOverlay">
  <a href="#" onclick="showTab('pitchTab')">Pitch</a>
  <a href="#" onclick="showTab('formationsTab')">Formations</a>
  <a href="#" onclick="showTab('playStylesTab')">Play Styles</a>
  <a href="#" onclick="showTab('walletTab')">Wallet</a>
  <a href="#" onclick="showTab('settingsTab')">Settings</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- Auth Screen -->
<div id="authOverlay">
  <div class="auth-box">
    <h1 style="color:var(--primary);">Paschala Hub</h1>
    <p id="authMsg" style="color:#888; font-size:0.85rem;">Enter your Gmail to receive a login link</p>
    <input id="email" type="email" placeholder="your-email@gmail.com">
    <button class="btn-main" onclick="sendLoginLink()">SEND LOGIN LINK</button>
    <p id="authError" style="color:#ff4d4d; font-size:0.75rem; margin-top:15px;"></p>
  </div>
</div>

<!-- App Content -->
<div id="appContent" style="display:none;">
  <div class="container">
    <!-- Pitch Tab -->
    <div id="pitchTab" class="tab">
      <button onclick="addPlayer()">Add Player</button>
      <div class="pitch-area" id="pitch"></div>
    </div>

    <!-- Formations Tab -->
    <div id="formationsTab" class="tab" style="display:none;">
      <h3>Formations</h3>
      <div id="formationsList"></div>
    </div>

    <!-- Play Styles Tab -->
    <div id="playStylesTab" class="tab" style="display:none;">
      <h3>Play Styles</h3>
      <div>
        <select id="playStyleSelect">
          <option value="possession">Possession</option>
          <option value="counter">Counter</option>
          <option value="highPress">High Press</option>
        </select>
      </div>
    </div>

    <!-- Wallet Tab -->
    <div id="walletTab" class="tab" style="display:none;">
      <h3>Wallet</h3>
      <p>Balance: <span id="walletBalance">0</span></p>
      <button onclick="addMoney(100)">Add 100</button>
    </div>

    <!-- Settings Tab -->
    <div id="settingsTab" class="tab" style="display:none;">
      <h3>Settings</h3>
      <button onclick="editProfile()">Edit Profile</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- SortableJS for drag & drop -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

<script>
/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyC60kQZtBM8iIDh46UX577t4YdnujU6kgs",
  authDomain: "money-app-bac4c.firebaseapp.com",
  projectId: "money-app-bac4c",
  storageBucket: "money-app-bac4c.appspot.com",
  messagingSenderId: "663419222795",
  appId: "1:663419222795:web:1ad595d41854f3cc45000e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* Hamburger Menu */
function toggleMenu() {
  const overlay = document.getElementById('menuOverlay');
  overlay.style.display = overlay.style.display==='flex'?'none':'flex';
}

/* Tabs */
function showTab(tabId){
  document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
  document.getElementById(tabId).style.display='block';
  toggleMenu();
}

/* Auth */
async function sendLoginLink(){
  const email = document.getElementById("email").value.trim();
  const actionCodeSettings = { url: window.location.href, handleCodeInApp:true };
  try {
    await auth.sendSignInLinkToEmail(email, actionCodeSettings);
    window.localStorage.setItem('emailForSignIn', email);
    document.getElementById("authMsg").innerText="Check your Gmail! We sent a login link.";
    document.getElementById("email").style.display="none";
  } catch(e){ document.getElementById("authError").innerText = e.message; }
}

async function completeSignIn(){
  if(auth.isSignInWithEmailLink(window.location.href)){
    let email = window.localStorage.getItem('emailForSignIn');
    if(!email) email = window.prompt('Provide your email for confirmation');
    try{
      await auth.signInWithEmailLink(email, window.location.href);
      window.localStorage.removeItem('emailForSignIn');
    } catch(e){ alert(e.message); }
  }
}

/* Auth State */
auth.onAuthStateChanged(async user=>{
  if(user){
    document.getElementById("authOverlay").style.display="none";
    document.getElementById("appContent").style.display="block";
    loadUserProfile();
    renderPitch();
    loadFormations();
    loadWallet();
  } else {
    completeSignIn();
  }
});

/* User Profile */
async function loadUserProfile(){
  const uid = auth.currentUser.uid;
  const doc = await db.collection("users").doc(uid).get();
  let name = auth.currentUser.displayName || doc.data()?.settings?.name || "Guest";
  document.getElementById("greetingText").innerText = "Hi "+name;
}

function editProfile(){
  const newName = prompt("Enter your name:");
  if(!newName) return;
  const uid = auth.currentUser.uid;
  db.collection("users").doc(uid).set({settings:{name:newName}}, {merge:true});
  document.getElementById("greetingText").innerText="Hi "+newName;
}

/* Wallet */
async function loadWallet(){
  const uid = auth.currentUser.uid;
  const doc = await db.collection("users").doc(uid).get();
  const balance = doc.data()?.wallet?.balance || 0;
  document.getElementById("walletBalance").innerText = balance;
}
async function addMoney(amount){
  const uid = auth.currentUser.uid;
  const userRef = db.collection("users").doc(uid);
  await userRef.set({wallet:{balance:firebase.firestore.FieldValue.increment(amount)}},{merge:true});
  loadWallet();
}

/* Pitch & Players */
let players=[];
const pitch = document.getElementById("pitch");

function renderPitch(){
  pitch.innerHTML="";
  const uid = auth.currentUser.uid;
  db.collection("users").doc(uid).collection("players").get().then(snap=>{
    players = [];
    snap.forEach(doc=>{
      const data = doc.data();
      data.id = doc.id;
      players.push(data);
    });
    players.forEach(p=>addPlayerCard(p));
  });
}

function addPlayerCard(player){
  const div = document.createElement("div");
  div.className="player-card";
  div.setAttribute("data-id",player.id);
  div.innerHTML=`<span class="pos-label">${player.position}</span>
                 <span class="p-name">${player.name}</span>
                 <span>Rating:${player.rating}</span>
                 <span>MP:${player.matches}</span>
                 <span>Stamina:${player.stamina}</span>
                 <span class="edit-btn" onclick="editPlayer('${player.id}')"><i class="fas fa-edit"></i></span>
                 <span class="delete-btn" onclick="deletePlayer('${player.id}')"><i class="fas fa-trash"></i></span>`;
  pitch.appendChild(div);
}

/* Add/Edit/Delete Players */
async function addPlayer(){
  const name = prompt("Player Name:");
  if(!name) return;
  const position = prompt("Position (e.g., ST, CMF):","ST");
  const rating = parseInt(prompt("Rating:", "100"));
  const matches = parseInt(prompt("Matches Played:", "0"));
  const stamina = parseInt(prompt("Stamina:", "100"));
  const uid = auth.currentUser.uid;
  const docRef = await db.collection("users").doc(uid).collection("players").add({
    name, position, rating, matches, stamina
  });
  renderPitch();
}

async function editPlayer(id){
  const uid = auth.currentUser.uid;
  const docRef = db.collection("users").doc(uid).collection("players").doc(id);
  const doc = await docRef.get();
  if(!doc.exists) return;
  const data = doc.data();
  const name = prompt("Player Name:",data.name);
  const position = prompt("Position:",data.position);
  const rating = parseInt(prompt("Rating:",data.rating));
  const matches = parseInt(prompt("Matches Played:",data.matches));
  const stamina = parseInt(prompt("Stamina:",data.stamina));
  await docRef.set({name,position,rating,matches,stamina});
  renderPitch();
}

async function deletePlayer(id){
  if(!confirm("Release this player?")) return;
  const uid = auth.currentUser.uid;
  await db.collection("users").doc(uid).collection("players").doc(id).delete();
  renderPitch();
}

/* Drag & Drop using SortableJS */
new Sortable(pitch,{animation:150});

/* Formations */
async function loadFormations(){
  const snap = await db.collection("formations").get();
  const list = document.getElementById("formationsList");
  list.innerHTML="";
  snap.forEach(doc=>{
    const div = document.createElement("div");
    div.innerText=doc.id;
    list.appendChild(div);
  });
}

/* Logout */
function logout(){ auth.signOut(); }
</script>

</body>
</html>
