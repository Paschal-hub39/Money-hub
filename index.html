<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Ideas Hub | Paschala</title>

<style>
  :root { --primary: #ff4da6; --bg: #0f0f14; --card-bg: #1a1a22; --accent: #00ff88; }
  
  body { 
    margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color:white;
    background-image: linear-gradient(rgba(15, 15, 20, 0.95), rgba(15, 15, 20, 0.95)), 
                      url('https://images.unsplash.com/photo-1611974714024-1595188e622b?q=80&w=1000');
    background-attachment: fixed; background-size: cover; padding-bottom: 80px;
  }

  header { text-align:center; padding:30px 20px; border-bottom: 2px solid var(--primary); background: rgba(22, 22, 29, 0.9); }
  
  .tab-content { display: none; padding: 20px; max-width: 500px; margin: auto; animation: fadeIn 0.4s ease; }
  .active-tab { display: block; }

  /* Navigation Bar */
  .bottom-nav { 
    position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #16161d; 
    display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000;
  }
  .nav-item { color: #888; text-align: center; font-size: 0.8rem; cursor: pointer; text-decoration: none; }
  .nav-item.active { color: var(--primary); }
  .nav-item i { display: block; font-size: 1.5rem; margin-bottom: 3px; }

  .container { background: rgba(26, 26, 34, 0.8); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
  input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #252530; color: white; box-sizing: border-box; }
  
  .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
  .btn-danger { background: #ff4d4d; }

  /* Leaderboard Style */
  .chart-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
  .rank { color: var(--accent); font-weight: bold; }

  .card { background: var(--card-bg); padding: 20px; margin-top: 15px; border-radius: 12px; border-left: 4px solid var(--primary); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<header>
  <h1>💸 Money Ideas</h1>
  <p id="topStatus" style="color:var(--primary); font-size: 0.8rem;">Loading connection...</p>
</header>

<div id="home" class="tab-content active-tab">
  <div class="container">
    <h2>Post Idea</h2>
    <input id="ideaInput" placeholder="Enter a money-making strategy...">
    <button class="btn-main" onclick="saveIdea()">SHARE IDEA</button>
  </div>
  
  <h2>Community Feed</h2>
  <div id="ideasDisplay"></div>
</div>

<div id="stats" class="tab-content">
  <div class="container">
    <h2>🏆 Top Contributors</h2>
    <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px;">Most active users based on shared ideas.</p>
    <div id="leaderboard"></div>
  </div>
</div>

<div id="settings" class="tab-content">
  <div class="container">
    <h2>Account Settings</h2>
    <p id="userEmailDisplay"></p>
    <input id="newPassword" type="password" placeholder="New Password">
    <button class="btn-main" onclick="changePassword()">Update Password</button>
    <button class="btn-main btn-danger" onclick="logout()">Log Out</button>
  </div>
  
  <div class="container" style="background: gold; color: black;">
    <h2>VIP Status</h2>
    <button onclick="pay()" style="width:100%; border:none; padding:10px; font-weight:bold; cursor:pointer;">ACTIVATE PREMIUM</button>
  </div>
</div>

<div id="authModal" class="tab-content" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000;">
   <div class="container" style="margin-top: 100px;">
      <h2>Welcome to the Hub</h2>
      <input id="regEmail" type="email" placeholder="Email Address">
      <input id="regPassword" type="password" placeholder="Password">
      <button class="btn-main" onclick="signup()">SIGN UP</button>
      <button class="btn-main" style="background:#333" onclick="login()">LOGIN</button>
   </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-home"></i>Home</div>
  <div class="nav-item" onclick="switchTab('stats', this)"><i class="fas fa-chart-line"></i>Stats</div>
  <div class="nav-item" onclick="switchTab('settings', this)"><i class="fas fa-cog"></i>Settings</div>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC60kQZtBM8iIDh46UX577t4YdnujU6kgs",
  authDomain: "money-app-bac4c.firebaseapp.com",
  projectId: "money-app-bac4c",
  storageBucket: "money-app-bac4c.firebasestorage.app",
  messagingSenderId: "663419222795",
  appId: "1:663419222795:web:1ad595d41854f3cc45000e",
  measurementId: "G-F5VM9FQW5K"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Tab Switching Logic
function switchTab(tabId, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(tabId).classList.add('active-tab');
  el.classList.add('active');
}

// Authentication
function signup() {
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;
  auth.createUserWithEmailAndPassword(email, password).catch(err => alert(err.message));
}
function login() {
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;
  auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
}
function logout() { auth.signOut(); }

function changePassword() {
  const newPass = document.getElementById("newPassword").value;
  auth.currentUser.updatePassword(newPass).then(() => alert("Password Updated!")).catch(err => alert(err.message));
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("authModal").style.display = "none";
    document.getElementById("topStatus").innerText = "CONNECTED: " + user.email;
    document.getElementById("userEmailDisplay").innerText = "Account: " + user.email;
  } else {
    document.getElementById("authModal").style.display = "block";
  }
});

// Save and Load Ideas
function saveIdea() {
  const text = document.getElementById("ideaInput").value;
  if (!text) return;
  db.collection("ideas").add({
    text: text,
    userEmail: auth.currentUser.email,
    time: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => { document.getElementById("ideaInput").value = ""; });
}

db.collection("ideas").orderBy("time", "desc").onSnapshot(snapshot => {
  const feed = document.getElementById("ideasDisplay");
  const leaderboard = {};
  feed.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();
    // Update Feed
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<strong>${data.text}</strong><br><small style="color:var(--primary)">${data.userEmail}</small>`;
    feed.appendChild(div);

    // Track for Chart
    leaderboard[data.userEmail] = (leaderboard[data.userEmail] || 0) + 1;
  });

  // Render Leaderboard Chart
  const chart = document.getElementById("leaderboard");
  chart.innerHTML = "";
  const sorted = Object.entries(leaderboard).sort((a,b) => b[1] - a[1]).slice(0, 5);
  sorted.forEach((user, i) => {
    chart.innerHTML += `<div class="chart-row"><span class="rank">#${i+1}</span> <span>${user[0]}</span> <span>${user[1]} ideas</span></div>`;
  });
});

function pay() {
  let handler = PaystackPop.setup({
    key: 'Pk_test_184b624c480ab512a8ca799ea92fad48d6342b9a',
    email: auth.currentUser.email,
    amount: 200000,
    currency: "NGN",
    callback: function(res) { alert("Paid! Ref: " + res.reference); }
  });
  handler.openIframe();
}
</script>
</body>
</html>
